<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flashtotype Decision Pack</title>
  <style>
    :root {
      --ink: #172026;
      --muted: #5f6b73;
      --line: #d9e1e7;
      --paper: #f7f9fb;
      --panel: #ffffff;
      --accent: #0f766e;
      --accent-strong: #0b5f59;
      --blue: #2563eb;
      --amber: #b45309;
      --red: #b91c1c;
      --green-bg: #e7f6f2;
      --blue-bg: #eaf1ff;
      --amber-bg: #fff2d8;
      --red-bg: #fee7e7;
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      letter-spacing: 0;
    }

    .shell {
      min-height: 100vh;
    }

    .topbar {
      background: #ffffff;
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: center;
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 22px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent-strong);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.12;
      font-weight: 760;
    }

    .tagline {
      margin: 10px 0 0;
      color: var(--muted);
      max-width: 760px;
      line-height: 1.55;
    }

    .verdict {
      min-width: 220px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--green-bg);
      padding: 16px;
    }

    .verdict span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .verdict strong {
      display: block;
      margin-top: 6px;
      font-size: 18px;
      line-height: 1.25;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 20px 48px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .metric {
      min-height: 92px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      padding: 16px;
    }

    .metric dt {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .metric dd {
      margin: 8px 0 0;
      font-size: 22px;
      font-weight: 760;
      overflow-wrap: anywhere;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 12px 0 18px;
    }

    .tab {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--ink);
      padding: 0 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .tab[aria-selected="true"] {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(280px, 0.55fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      padding: 20px;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 22px;
      line-height: 1.25;
    }

    .summary {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
    }

    .claim-list,
    .action-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .claim {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      background: #ffffff;
    }

    .claim p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 0 9px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.source-backed {
      background: var(--green-bg);
      color: var(--accent-strong);
    }

    .badge.assumption {
      background: var(--amber-bg);
      color: var(--amber);
    }

    .badge.needs-validation {
      background: var(--red-bg);
      color: var(--red);
    }

    .split {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .note-box {
      border-left: 4px solid var(--blue);
      background: var(--blue-bg);
      border-radius: var(--radius);
      padding: 14px;
      color: #1e3a8a;
      line-height: 1.5;
    }

    .evidence-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 12px;
      padding: 12px 0;
      border-top: 1px solid var(--line);
    }

    .evidence-row:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .evidence-row a {
      color: var(--blue);
      overflow-wrap: anywhere;
    }

    .side-stack {
      display: grid;
      gap: 18px;
    }

    .action-list li {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: #ffffff;
      line-height: 1.45;
    }

    .empty {
      color: var(--muted);
      font-style: italic;
    }

    @media (max-width: 860px) {
      .topbar-inner,
      .layout {
        grid-template-columns: 1fr;
      }

      .metrics,
      .split {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .verdict {
        min-width: 0;
      }
    }

    @media (max-width: 560px) {
      h1 {
        font-size: 28px;
      }

      .metrics,
      .split,
      .evidence-row {
        grid-template-columns: 1fr;
      }

      .tab {
        flex: 1 1 auto;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div>
          <p class="eyebrow">Flashtotype Decision Pack</p>
          <h1 id="product-name">Product idea</h1>
          <p class="tagline" id="tagline">A PM/PO briefing generated from the product thesis, evidence, persona, and tech risk review.</p>
        </div>
        <aside class="verdict" aria-label="Recommendation">
          <span>Recommendation</span>
          <strong id="verdict">Draft</strong>
          <p class="tagline" id="confidence">Confidence: Not set</p>
        </aside>
      </div>
    </header>

    <section class="container">
      <dl class="metrics" id="metrics"></dl>
      <nav class="tabs" id="tabs" aria-label="Decision pack sections"></nav>
      <section class="layout">
        <article class="panel" id="main-panel"></article>
        <aside class="side-stack">
          <section class="panel">
            <h2>Next Actions</h2>
            <ol class="action-list" id="next-actions"></ol>
          </section>
          <section class="panel">
            <h2>Evidence Snapshot</h2>
            <div id="evidence-snapshot"></div>
          </section>
        </aside>
      </section>
    </section>
  </main>

</body>
</html>
